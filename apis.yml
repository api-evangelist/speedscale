apis:
  - aid: speedscale:speedscale-platform
    name: Speedscale Platform
    description: >-
      Speedscale captures production API traffic and replays it in lower
      environments for load testing, regression testing, and chaos testing. It
      provides traffic capture, replay, mocking of backend dependencies, and
      performance assertions for Kubernetes-based applications.
