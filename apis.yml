aid: speedscale
name: Speedscale
description: >-
  Speedscale is an API traffic replay and performance testing platform that
  captures production API traffic and replays it in test environments for load
  testing, regression testing, and validation of AI-generated code. It enables
  teams to simulate realistic traffic patterns without building test scripts
  from scratch, with native Kubernetes support, service virtualization for
  backend mocking, PII-safe replay, and MCP integration for AI coding agents
  (Claude Code, Cursor, Copilot).
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
